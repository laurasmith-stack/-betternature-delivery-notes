<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f4;min-height:100vh;color:#222}
.header{background:#1a7a78;padding:14px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.logo-box{background:white;border-radius:8px;padding:8px 12px;display:flex;flex-direction:column;align-items:center;line-height:1.1}
.logo-box .l1{font-size:13px;font-weight:900;color:#1a7a78;letter-spacing:.05em}
.logo-box .l2{font-size:13px;font-weight:900;color:#1a7a78;letter-spacing:.05em}
.header-text .title{color:white;font-size:17px;font-weight:700}

.step{width:26px;height:26px;border-radius:50%;background:#1a7a78;color:white;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}

.field input,.field select{height:38px;border:1.5px solid #ddd;border-radius:8px;padding:0 12px;font-size:14px;background:#fafafa;color:#222;width:100%;font-family:inherit}
.field input:focus,.field select:focus{outline:none;border-color:#1a7a78;background:white}
.drop-zone{border:2.5px dashed #b8d4d3;border-radius:12px;padding:32px 20px;text-align:center;background:#f8fcfc;transition:all .2s;margin-bottom:12px}
.drop-zone.over{border-color:#1a7a78;background:#edf7f6}

#file-input{display:block;width:80%;margin:0 auto;font-size:14px;padding:8px;border:1.5px solid #1a7a78;border-radius:8px;background:white;cursor:pointer}
#file-input::-webkit-file-upload-button{background:#1a7a78;color:white;border:none;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;margin-right:12px}
#file-input::file-selector-button{background:#1a7a78;color:white;border:none;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;margin-right:12px}
.parsed-box{background:#f0faf9;border:1.5px solid #a8d8d6;border-radius:9px;padding:14px 16px;margin:14px 0 4px}
.parsed-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid #d0ecea}
.parsed-row:last-child{border-bottom:none}
.parsed-key{color:#555;font-weight:500}
.parsed-val{color:#1a7a78;font-weight:700;text-align:right;max-width:65%;word-break:break-word}
.btn{height:38px;padding:0 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;border:1.5px solid #ddd;background:white;color:#333;font-family:inherit}
.btn-primary{background:#1a7a78;color:white;border-color:#1a7a78}
.btn-primary:hover{background:#155f5d}
.btn-full{width:100%;justify-content:center;margin-top:12px;height:48px;font-size:15px}
.btn-danger{color:#c0392b;border-color:#f5c6c2}
.btn-danger:hover{background:#fef0ee}
.btn-sm{height:30px;padding:0 10px;font-size:12px}

.batch-row:last-child{border-bottom:none}
.batch-info{display:flex;flex-direction:column;gap:2px}
.batch-label{font-size:14px;font-weight:600;color:#222}
.batch-meta{font-size:12px;color:#888}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:999px;margin-left:7px;font-weight:600}
.badge-warn{background:#fff3cd;color:#856404}
.badge-err{background:#fde8e8;color:#c0392b}
.badge-ok{background:#e8f5e9;color:#2e7d32}
.msg{font-size:13px;padding:9px 13px;border-radius:7px;margin-top:10px;font-weight:500}
.msg-ok{background:#e8f5e9;color:#2e7d32}
.msg-err{background:#fde8e8;color:#c0392b}
.msg-info{background:#e3f2fd;color:#1565c0}
.empty{font-size:14px;color:#bbb;text-align:center;padding:20px 0}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:520px){.grid2{grid-template-columns:1fr}}

<body>
<div class="header">
  <div class="logo-box"><span class="l1">BETTER</span><span class="l2">NATURE</span></div>
  <div class="header-text">
    <div class="title">Delivery Note Generator</div>
    <div class="sub">Better Nature Deutschland GmbH</div>
  </div>
</div>
<div class="container">
  <div class="card">
    <div class="card-header"><span class="step">1</span><span class="card-title">Upload customer order PDF</span></div>
    <div class="drop-zone" id="drop-zone" ondragover="event.preventDefault();this.classList.add(&#39;over&#39;)" ondragleave="this.classList.remove(&#39;over&#39;)" ondrop="onDrop(event)">
      <div class="dz-icon">📄</div>
      <div class="dz-title">Drag and drop order PDF here</div>
      <div class="dz-sub">GB Fine-Food GmbH Lieferschein</div>
      <div class="dz-or">- or -</div>
      <input type="file" id="file-input" accept=".pdf,application/pdf">
      <div class="dz-filename" id="dz-filename"></div>
    </div>
    <div id="parsed-box" class="parsed-box" style="display:none">
      <div class="parsed-row"><span class="parsed-key">Order no.</span><span class="parsed-val" id="p-order">-</span></div>
      <div class="parsed-row"><span class="parsed-key">Delivery note no.</span><span class="parsed-val" id="p-dn">-</span></div>
      <div class="parsed-row"><span class="parsed-key">Delivery date</span><span class="parsed-val" id="p-date">-</span></div>
      <div class="parsed-row"><span class="parsed-key">Delivery address</span><span class="parsed-val" id="p-addr">-</span></div>
    </div>
    <div id="msg-upload"></div>
  </div>
  <div class="card">
    <div class="card-header"><span class="step">2</span><span class="card-title">Batch codes</span></div>
    <div class="grid2">
      <div class="field"><label>Lot code</label><input id="in-lot" placeholder="e.g. 0262622"></div>
      <div class="field"><label>Expiry date</label><input id="in-expiry" type="date"></div>
      <div class="field full"><label>Note / variant (optional)</label><input id="in-note" placeholder="e.g. Smoky, Natur, Curry mix"></div>
    </div>
    <button class="btn btn-primary" id="save-btn" onclick="saveBatch()">✓ Save batch</button>
    <div id="msg-save"></div>
    <div id="batch-list" style="margin-top:14px"><p class="empty">No batches saved yet.</p></div>
  </div>
  <div class="card">
    <div class="card-header"><span class="step">3</span><span class="card-title">Generate delivery note</span></div>
    <div class="field" style="margin-bottom:14px">
      <label>Select batch</label>
      <select id="in-batch"><option value="">- choose a saved batch -</option></select>
    </div>
    <button class="btn btn-primary btn-full" id="gen-btn" onclick="generatePDF()">↓ Generate &amp; download delivery note PDF</button>
    <div id="msg-gen"></div>
  </div>
</div>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

var batches = [];
var order = null;

document.getElementById('file-input').addEventListener('change', function() {
  if (this.files && this.files[0]) processFile(this.files[0]);
});

function onDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('over');
  var f = e.dataTransfer.files[0];
  if (f) processFile(f);
}

function processFile(file) {
  if (!file.name.toLowerCase().endsWith('.pdf') && file.type !== 'application/pdf') {
    showMsg('msg-upload', 'Please select a PDF file.', 'err');
    return;
  }
  document.getElementById('dz-filename').textContent = file.name;
  showMsg('msg-upload', 'Reading PDF...', 'info');
  var reader = new FileReader();
  reader.onload = function(e) { extractPDF(new Uint8Array(e.target.result)); };
  reader.onerror = function() { showMsg('msg-upload', 'Could not read file.', 'err'); };
  reader.readAsArrayBuffer(file);
}

function extractPDF(data) {
  pdfjsLib.getDocument({ data: data }).promise.then(function(pdf) {
    var allText = '';
    var chain = Promise.resolve();
    for (var i = 1; i <= pdf.numPages; i++) {
      (function(pn) {
        chain = chain.then(function() {
          return pdf.getPage(pn).then(function(pg) {
            return pg.getTextContent().then(function(tc) {
              allText += tc.items.map(function(it) { return it.str; }).join(' ') + ' ';
            });
          });
        });
      })(i);
    }
    chain.then(function() { parseOrderText(allText); });
  }).catch(function(e) { showMsg('msg-upload', 'Could not open PDF: ' + e.message, 'err'); });
}

function parseOrderText(text) {
  var orderNo = '', deliveryDate = '', deliveryAddress = '';
  var m = text.match(/Bestell-Nr[^0-9]*([0-9]{7,12})/i);
  if (m) orderNo = m[1].trim();
  m = text.match(/Lieferdatum\s+([0-9]{2})\.([0-9]{2})\.([0-9]{4})/i);
  if (m) {
    var mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    deliveryDate = parseInt(m[1]) + '-' + mo[parseInt(m[2]) - 1] + '-' + m[3];
  }
  m = text.match(/((?:Aldi|Rewe|Lidl|Edeka|Netto|Penny|Kaufland|Norma)[^ ]*?[0-9]{5}\s+[A-Za-z][A-Za-z\s\(\)\-]*)/i);
  if (m) deliveryAddress = m[1].replace(/\s+/g, ' ').trim().substring(0, 200);
  if (!orderNo && !deliveryDate) {
    showMsg('msg-upload', 'Could not extract details. Is this a GB Fine-Food Lieferschein PDF?', 'err');
    return;
  }
  order = { orderNo: orderNo, deliveryDate: deliveryDate, deliveryAddress: deliveryAddress };
  document.getElementById('p-order').textContent = orderNo || '-';
  document.getElementById('p-dn').textContent = (orderNo || '') + '_1';
  document.getElementById('p-date').textContent = deliveryDate || '-';
  document.getElementById('p-addr').textContent = deliveryAddress || '-';
  document.getElementById('parsed-box').style.display = 'block';
  document.getElementById('drop-zone').classList.add('loaded');
  showMsg('msg-upload', 'Order loaded. Select a batch and generate.', 'ok');
}

function fmtDate(s) {
  if (!s) return '';
  var d = new Date(s + 'T00:00:00');
  var mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return d.getDate() + '-' + mo[d.getMonth()] + '-' + d.getFullYear();
}

function daysUntil(s) { return !s ? 9999 : (new Date(s + 'T00:00:00') - Date.now()) / 86400000; }

function persist() {
  try { localStorage.setItem('bn_batches_v4', JSON.stringify(batches)); } catch(e) {}
}

function loadStored() {
  try { var v = localStorage.getItem('bn_batches_v4'); if (v) batches = JSON.parse(v); } catch(e) {}
  render();
}

function render() {
  var list = document.getElementById('batch-list');
  var sel = document.getElementById('in-batch');
  sel.innerHTML = '<option value="">- choose a saved batch -</option>';
  if (!batches.length) { list.innerHTML = '<p class="empty">No batches saved yet.</p>'; return; }
  list.innerHTML = batches.map(function(b, i) {
    var d = daysUntil(b.expiry);
    var badge = d < 0 ? '<span class="badge badge-err">expired</span>' : d <= 30 ? '<span class="badge badge-warn">expiring soon</span>' : '<span class="badge badge-ok">active</span>';
    return '<div class="batch-row"><div class="batch-info"><span class="batch-label">Lot ' + b.lot + badge + '</span><span class="batch-meta">Expires ' + fmtDate(b.expiry) + (b.note ? ' &middot; ' + b.note : '') + '</span></div><button class="btn btn-danger btn-sm" onclick="delBatch(' + i + ')">Remove</button></div>';
  }).join('');
  batches.forEach(function(b, i) {
    var o = document.createElement('option');
    o.value = i;
    o.textContent = 'Lot ' + b.lot + ' - ' + fmtDate(b.expiry) + (b.note ? ' (' + b.note + ')' : '');
    sel.appendChild(o);
  });
}

function showMsg(id, text, type) {
  var el = document.getElementById(id);
  el.className = 'msg msg-' + type;
  el.textContent = text;
  if (type === 'ok') setTimeout(function() { el.textContent = ''; el.className = ''; }, 4000);
}

function saveBatch() {
  var lot = document.getElementById('in-lot').value.trim();
  var expiry = document.getElementById('in-expiry').value;
  var note = document.getElementById('in-note').value.trim();
  if (!lot || !expiry) { showMsg('msg-save', 'Lot code and expiry date are required.', 'err'); return; }
  batches.unshift({ lot: lot, expiry: expiry, note: note });
  persist();
  document.getElementById('in-lot').value = '';
  document.getElementById('in-expiry').value = '';
  document.getElementById('in-note').value = '';
  showMsg('msg-save', 'Lot ' + lot + ' saved.', 'ok');
  render();
}

function delBatch(i) { batches.splice(i, 1); persist(); render(); }

function generatePDF() {
  if (!order) { showMsg('msg-gen', 'Upload a customer order PDF first.', 'err'); return; }
  var idx = document.getElementById('in-batch').value;
  if (idx === '') { showMsg('msg-gen', 'Select a batch first.', 'err'); return; }
  var btn = document.getElementById('gen-btn');
  btn.innerHTML = '<span class="spinner"></span> Generating...';
  btn.disabled = true;
  var batch = batches[parseInt(idx)];
  setTimeout(function() {
    try {
      buildPDF(order, batch);
      btn.innerHTML = '&#8595; Generate &amp; download delivery note PDF';
      btn.disabled = false;
      showMsg('msg-gen', 'PDF downloaded successfully.', 'ok');
    } catch(e) {
      btn.innerHTML = '&#8595; Generate &amp; download delivery note PDF';
      btn.disabled = false;
      showMsg('msg-gen', 'Error: ' + e.message, 'err');
    }
  }, 100);
}

function buildPDF(order, batch) {
  var doc = new window.jspdf.jsPDF({ unit: 'mm', format: 'a4' });
  var W = 210, H = 297;

  // Logo box - teal rectangle with BETTER NATURE text
  doc.setFillColor(26, 122, 120);
  doc.roundedRect(14, 5, 30, 18, 2, 2, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(8);
  doc.text('BETTER', 18, 12);
  doc.text('NATURE', 18, 19);

  // Address box - dotted border
  doc.setDrawColor(150, 180, 200);
  doc.setLineWidth(0.3);
  doc.setFillColor(255, 255, 255);
  doc.rect(47, 5, 68, 18, 'FD');
  doc.setTextColor(26, 122, 120);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(6);
  doc.text('Better Nature Deutschland GmbH', 49, 10);
  doc.setFont('helvetica', 'normal');
  doc.setTextColor(80, 80, 80);
  doc.text('Max-Eyth-Straße 46, Ellwangen, 73479, Deutschland', 49, 14);
  doc.setTextColor(26, 122, 120);
  doc.text('Email hello@betternaturetempeh.co', 49, 18);
  doc.text('www.betternaturetempeh.co', 49, 21.5);

  // Company info top right
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(7.5);
  doc.setTextColor(26, 122, 120);
  doc.text('Better Nature Deutschland GmbH', W - 14, 10, { align: 'right' });
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(6);
  doc.setTextColor(30, 30, 30);
  ['Max-Eyth-Straße 46,  73479 Ellwangen Jagst', 'Deutschland',
   'EORI Number: DE760703666419790', 'VAT Number: NL828028606B01',
   'German Business Number: HRB 744913', 'GLN: 4262414240007',
   'sales@betternaturetempeh.co', '+447838300248', 'Page: 1 / 1'
  ].forEach(function(l, i) { doc.text(l, W - 14, 14 + i * 3.2, { align: 'right' }); });

  // Separator
  doc.setDrawColor(200, 200, 200);
  doc.setLineWidth(0.3);
  doc.line(14, 28, W - 14, 28);

  // Title
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(16);
  doc.setTextColor(26, 122, 120);
  doc.text('Delivery Note', 14, 38);

  // Info block border
  doc.setDrawColor(210, 210, 210);
  doc.setLineWidth(0.25);
  doc.rect(13, 41, W - 26, 48, 'S');

  function row(label, value, y) {
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8.5);
    doc.setTextColor(100, 100, 100);
    doc.text(label, 15, y);
    doc.setTextColor(20, 20, 20);
    value.split('
').forEach(function(l, i) { doc.text(l, 60, y + i * 4.2); });
  }

  var addr = (order.deliveryAddress || '-').replace(/,\s+/g, '
');
  row('Delivery address:', addr, 48);
  row('Billing address:', 'GB Fine-Food GmbH, Bahnhofstraße 13a, 25557 Hanerau-
Hademarschen', 66);
  row('Order No:', order.orderNo || '-', 77);
  row('Delivery Note No:', (order.orderNo || '') + '_1', 82.5);
  row('Delivery Date', order.deliveryDate || '-', 88);

  // Table
  doc.setDrawColor(20, 20, 20);
  doc.setLineWidth(0.5);
  doc.line(14, 96, W - 14, 96);
  var hY = 103;
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(8.5);
  doc.setTextColor(20, 20, 20);
  doc.text('SKU #', 14, hY);
  doc.text('Item - TEMPEH', 35, hY);
  doc.text('PRODUCTS', 35, hY + 4);
  doc.text('Case', 140, hY);
  doc.text('Qty.', 140, hY + 4);
  doc.text('Lot Code', 157, hY);
  doc.text('Expiring', 176, hY);
  doc.text('Date', 176, hY + 4);
  doc.setLineWidth(0.35);
  doc.line(14, hY + 6, W - 14, hY + 6);

  var pY = hY + 13;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8.5);
  doc.text('1034860', 14, pY);
  doc.text('Bio Tempeh, 200g sortert x12 [1]', 35, pY);
  doc.text('120', 140, pY);
  doc.text(batch.lot, 157, pY);
  doc.text(fmtDate(batch.expiry), 176, pY);

  var tY = pY + 11;
  doc.setDrawColor(180, 180, 180);
  doc.setLineWidth(0.25);
  doc.line(14, tY - 3, W - 14, tY - 3);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8.5);
  doc.setTextColor(20, 20, 20);
  doc.text('Total', 14, tY);
  doc.text('120', 140, tY);
  doc.line(14, tY + 4, W - 14, tY + 4);

  doc.setFontSize(7);
  doc.setTextColor(80, 80, 80);
  doc.text('Note: Product SBR010010 "Better Nature Bio Tempeh 10x200G" is classified as BIO (NL-BIO-01). Please consider this if present in the delivery note.', 14, tY + 13);

  doc.setFontSize(8);
  doc.text('Despatch Operator', 14, H - 38);
  doc.text('Truck Temp Set Point', 14, H - 32);
  doc.text('Condition of the Truck', 14, H - 26);
  doc.setDrawColor(180, 180, 180);
  doc.setLineWidth(0.3);
  doc.line(14, H - 21, W - 14, H - 21);
  doc.setFontSize(7.5);
  doc.text('[1] ' + (batch.note || 'Smoky'), 14, H - 16);

  doc.save('Delivery_Note_' + order.orderNo + '.pdf');
}

loadStored();
</script>
